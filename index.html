<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Blaster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game">
        <div class="title-bar">NUMBER BLASTER</div>
    </div>

    <!-- [MANUAL EDIT] START SCREEN -->
    <div id="screen-start" class="screen active center-screen">
        <div class="start-title">NUMBER<br>BLASTER</div>
        <div class="start-subtitle">MATHS ARCADE CHALLENGE</div>

        <div class="instructions">
            <p>FIND THE MISSING NUMBER IN EACH EQUATION</p>
            <p>LEVEL 1 - ADD &amp; SUBTRACT - <span> +1 PT</span></p>
            <p>LEVEL 2 - MULTIPLY &amp; DIVIDE - <span> +2 PTS</span></p>
            <p>YOU HAVE <span>3 LIVES</span> WRONG ANSWER COSTS ONE LIFE</p> 
            <p>COMPLETE LEVEL 1 TO UNLOCK LEVEL 2</p>
        </div>

        <div class="press-start blink">PRESS START ◀</div>
        <button class="btn btn-primary" style="margin-top: 1.5rem;" onclick="startLevel(1)">START GAME ▶</button>
     </div>

     <!--PLAY SCREEN-->
        <div id="screen-play" class="screen">
            <div class="hud">
                <div class="hud-label">LEVEL</div>
                <div class="hud-value" id="hud-level">1</div>
            </div>
        </div>
    </div>
</body>
</html>
